<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">MyShop</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link active" href="#">Главная</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Категории</a></li>
                <li class="nav-item"><a class="nav-link" href="#">О нас</a></li>
            </ul>

            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="cart.html">Корзина</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Профиль</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="mb-4">Товары</h2>

    <div class="row" id="products"></div>

</div>

<script>
    const API_URL = 'http://localhost:8080/products';

    async function loadProducts() {
        try {
            const response = await fetch(API_URL);
            const products = await response.json();

            const container = document.getElementById('products');
            container.innerHTML = '';

            products.forEach(p => {
                const card = `
                <div class="col-md-4 mb-4">
                    <div class="card h-100 shadow-sm">
                        <img src="${p.image || 'https://via.placeholder.com/300'}" class="card-img-top" style="height:200px; object-fit:cover;">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">${p.name}</h5>
                            <p class="card-text">${p.description || ''}</p>
                            <div class="mt-auto">
                                <p class="fw-bold">${p.price} ₽</p>
                                <button class="btn btn-primary w-100" onclick="addToCart(${p.id})">В корзину</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
                container.innerHTML += card;
            });

        } catch (err) {
            console.error(err);
        }
    }

    function addToCart(id) {
        const token = localStorage.getItem('jwt');

        fetch('http://localhost:8080/cart', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({ product_id: id })
        })
            .then(() => alert('Добавлено в корзину'))
            .catch(() => alert('Ошибка'));
    }

    loadProducts();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
