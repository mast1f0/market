<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 400px;">

        <ul class="nav nav-tabs mb-3" id="authTabs">
            <li class="nav-item">
                <button class="nav-link active" onclick="showTab('login')">Вход</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" onclick="showTab('register')">Регистрация</button>
            </li>
        </ul>
        <div id="loginTab">
            <h4 class="text-center mb-3">Вход</h4>

            <div class="mb-3">
                <input type="text" id="login" class="form-control" placeholder="Логин">
            </div>

            <div class="mb-3">
                <input type="password" id="password" class="form-control" placeholder="Пароль">
            </div>

            <button class="btn btn-primary w-100" onclick="login()">Войти</button>
        </div>

        <div id="registerTab" style="display:none;">
            <h4 class="text-center mb-3">Регистрация</h4>

            <div class="mb-3">
                <input type="text" id="reg_login" class="form-control" placeholder="Логин">
            </div>

            <div class="mb-3">
                <input type="password" id="reg_password" class="form-control" placeholder="Пароль">
            </div>

            <button class="btn btn-success w-100" onclick="register()">Зарегистрироваться</button>
        </div>

        <div id="error" class="text-danger mt-3 text-center"></div>

    </div>
</div>

<script>
    function showTab(tab) {
        document.getElementById('loginTab').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('registerTab').style.display = tab === 'register' ? 'block' : 'none';

        const buttons = document.querySelectorAll('.nav-link');
        buttons.forEach(btn => btn.classList.remove('active'));

        if (tab === 'login') buttons[0].classList.add('active');
        else buttons[1].classList.add('active');
    }

    async function login() {
        const login = document.getElementById('login').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('http://localhost:8081/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login, password })
            });

            if (!response.ok) throw new Error('Ошибка входа');

            const data = await response.json();
            localStorage.setItem('jwt', data.token);

            alert('Успешный вход');            window.location.href = '/index.html';

        } catch (err) {
            document.getElementById('error').innerText = err.message;
        }
    }

    async function register() {
        const login = document.getElementById('reg_login').value;
        const password = document.getElementById('reg_password').value;

        try {
            const response = await fetch('http://localhost:8081/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login, password })
            });

            if (!response.ok) throw new Error('Ошибка регистрации');

            alert('Регистрация успешна! Теперь войдите');
            showTab('login');

        } catch (err) {
            document.getElementById('error').innerText = err.message;
        }
    }
</script>

</body>
</html>
