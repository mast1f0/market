services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: store_usr
      POSTGRES_PASSWORD: password132
      POSTGRES_DB: store_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U store_usr -d store_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  migrator:
    image: migrate/migrate:v4.19.1
    command:
      - "-path"
      - "/migrations"
      - "-database"
      - "postgres://store_usr:password132@postgres:5432/store_db?sslmode=disable"
      - "up"
    volumes:
      - ./migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net

  auth-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: strong_password
      POSTGRES_DB: auth_db
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  auth-migrator:
    build:
      context: ./services/auth
      dockerfile: Dockerfile.migrate
    command:
      - "-path"
      - "/migrations"
      - "-database"
      - "postgres://auth_user:strong_password@auth-postgres:5432/auth_db?sslmode=disable"
      - "up"
    depends_on:
      auth-postgres:
        condition: service_healthy
    networks:
      - app_net

  market:
    build: .
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    expose:
      - "8080"
    environment:
      DB_USER: store_usr
      DB_PASSWORD: password132
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: store_db
      DB_SSLMODE: disable
      JWT_SECRET: superSecret
    networks:
      - app_net

  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      auth-postgres:
        condition: service_healthy
      auth-migrator:
        condition: service_completed_successfully
    expose:
      - "8081"
    environment:
      DB_HOST: auth-postgres
      DB_PORT: 5432
      DB_USER: auth_user
      DB_PASSWORD: strong_password
      DB_NAME: auth_db
      JWT_SECRET: superSecret
    networks:
      - app_net

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_SERVER_URL: http://minio.localhost:9000
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: always
    networks:
      - app_net

  images-service:
    build:
      context: ./services/images
      dockerfile: Dockerfile
    restart: always
    extra_hosts:
      - "minio.localhost:host-gateway"
    depends_on:
      minio:
        condition: service_healthy
    expose:
      - "8082"
    environment:
      MINIO_ENDPOINT: minio.localhost:9000
      MINIO_EXTERNAL_URL: http://minio.localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: product-images
      MINIO_REGION: us-east-1
    networks:
      - app_net

  nginx:
    build:
      context: ./web/market-frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - market
      - auth-service
      - images-service
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  postgres_data:
  auth_postgres_data:
  minio_data:
